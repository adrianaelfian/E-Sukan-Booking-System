<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CREATE - Add New Facility</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #4CAF50;
            text-align: center;
            margin-top: 0;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn-back {
            display: inline-block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
        }
        
        hr {
            margin: 20px 0;
        }
        
        .info {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 13px;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 CREATE New Facility</h1>
        <p>Fill in the form below to add a new facility.</p>
        
        <hr>
        
        <form action="#">
            <label>Facility Name:</label>
            <input type="text" placeholder="e.g., Badminton Court A">
            
            <label>Facility Type:</label>
            <select>
                <option>Badminton Court</option>
                <option>Futsal Court</option>
                <option>Basketball Court</option>
            </select>
            
            <label>Location:</label>
            <input type="text" placeholder="e.g., Sports Complex, Level 1">
            
            <label>Capacity (players):</label>
            <input type="number" placeholder="e.g., 4">
            
            <label>Status:</label>
            <select>
                <option>Available</option>
                <option>Under Maintenance</option>
                <option>Closed</option>
            </select>
            
            <label>Description (optional):</label>
            <textarea rows="3" placeholder="Additional information"></textarea>
            
            <button type="submit">✅ Add Facility</button>
        </form>
        
        <a href="index.html" class="btn-back">← Back to Storyboard</a>
        
        <div class="info">
            <strong>How CREATE works:</strong><br>
            When submitted, this form sends data to CreateFacilityServlet.java, which saves it to the database using FacilityDAO.
        </div>
    </div>
</body>
</html>
