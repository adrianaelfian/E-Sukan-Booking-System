<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPDATE - Edit Facility</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #ff9800;
            text-align: center;
            margin-top: 0;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .readonly-field {
            background: #f0f0f0;
            color: #666;
        }
        
        button {
            background: #ff9800;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn-back {
            display: inline-block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
        }
        
        hr {
            margin: 20px 0;
        }
        
        .info {
            background: #fff3e0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 13px;
            color: #e65100;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Facility</h1>
        <p>Update the information for an existing facility.</p>
        
        <hr>
        
        <form action="#">
            <label>Facility ID:</label>
            <input type="text" value="1" readonly class="readonly-field">
            
            <label>Facility Name:</label>
            <input type="text" value="Badminton Court A">
            
            <label>Facility Type:</label>
            <select>
                <option selected>Badminton Court</option>
                <option>Futsal Court</option>
                <option>Basketball Court</option>
            </select>
            
            <label>Location:</label>
            <input type="text" value="Sports Complex Level 1">
            
            <label>Capacity (players):</label>
            <input type="number" value="4">
            
            <label>Status:</label>
            <select>
                <option selected>Available</option>
                <option>Under Maintenance</option>
                <option>Closed</option>
            </select>
            
            <button type="submit">✏️ Update Facility</button>
        </form>
        
        <a href="index.html" class="btn-back">← Back to Storyboard</a>
        
        <div class="info">
            <strong>How UPDATE works:</strong><br>
            The form loads existing data, user makes changes, then UpdateFacilityServlet.java saves changes using FacilityDAO.updateFacility().
        </div>
    </div>
</body>
</html>
